# Render-compatible deployment blueprint for OCEAN.
# The app is packaged by the repository Dockerfile and exposes FastAPI on PORT.

services:
  - type: web
    name: ocean-orchestrator
    runtime: docker
    dockerfilePath: ../Dockerfile
    dockerContext: ..
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: ENV
        value: production
