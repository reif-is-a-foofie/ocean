name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install (ocean CLI + postinstall pip)
        run: npm install
      - name: Verify npx ocean
        run: npx ocean --help
      - name: Install Python tooling for CI
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest
      - name: Run tests
        run: pytest
      - name: Lint
        run: |
          flake8 . --exclude=venv/,node_modules/
          black --check . --extend-exclude '(venv|node_modules)'
          
